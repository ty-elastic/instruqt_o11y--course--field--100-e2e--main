apiVersion: v1
kind: ServiceAccount
metadata:
  name: guacamole-sa
  namespace: infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: guac-pod-connector
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/attach", "pods/exec"]
  verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: guac-pod-connector-binding
  namespace: infra
subjects:
- kind: ServiceAccount
  name: guacamole-sa
  namespace: guacamole
roleRef:
  kind: Role
  name: guac-pod-connector
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: windows-user-mapping
  namespace: infra
data:
  user-mapping.xml: |
    <user-mapping>
      <!-- Define the Guacamole web UI admin credentials -->
      <authorize username="$WINDOWS_HOST_USERNAME" password="$WINDOWS_HOST_PASSWORD">
        <connection name="Windows Server">
          <protocol>rdp</protocol>
          <param name="hostname">$WINDOWS_HOST</param> 
          <param name="port">3389</param>
          <param name="username">$WINDOWS_HOST_USERNAME</param>
          <param name="password">$WINDOWS_HOST_PASSWORD</param>
          <param name="security">nla</param>
          <param name="ignore-cert">true</param>
        </connection>

        <connection name="Ramen">
            <protocol>kubernetes</protocol>
            <param name="hostname">kubernetes.default.svc</param>
            <param name="namespace">default</param>
            <param name="pod">ramen</param>
            <param name="ignore-cert">true</param>
            <exec-command>"bash"</exec-command>
        </connection>

      </authorize>

      <authorize username="eden$WINDOWS_HOST_USERNAME">
        <connection name="Windows Server">
          <protocol>rdp</protocol>
          <param name="hostname">$WINDOWS_HOST</param> 
          <param name="port">3389</param>
          <param name="username">$WINDOWS_HOST_USERNAME</param>
          <param name="password">$WINDOWS_HOST_PASSWORD</param>
          <param name="security">nla</param>
          <param name="ignore-cert">true</param>
        </connection>
      </authorize>
    </user-mapping>
---
apiVersion: v1
kind: Pod
metadata:
  name: windows
  namespace: infra
  labels:
    service: windows
spec:
  volumes:
    - name: guac-config-volume
      configMap:
        name: windows-user-mapping
  serviceAccountName: guacamole-sa # Crucial for auto-auth
  containers:
    # 1. Guacamole Web Application
    - name: guacamole-client
      image: guacamole/guacamole:latest
      ports:
        - containerPort: 8080
          protocol: TCP
      env:
        - name: GUACD_HOSTNAME
          value: "localhost"
        - name: GUACD_PORT
          value: "4822"
        - name: GUACAMOLE_HOME
          value: "/etc/guacamole"
        - name: HTTP_AUTH_ENABLED
          value: "true"
        - name: "HTTP_AUTH_HEADER"
          value: "X-Windows-User"
      resources:
        limits:
          memory: "512Mi"
          cpu: "500m"
      volumeMounts:
        - name: guac-config-volume
          mountPath: /etc/guacamole
    # 2. Guacamole Protocol Daemon (Sidecar)
    - name: guacd
      image: guacamole/guacd:latest
      ports:
        - containerPort: 4822
          protocol: TCP
      volumeMounts:
        - name: guac-config-volume
          mountPath: /etc/guacamole/
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: windows
  name: windows-ext
  namespace: infra
spec:
  ports:
    - name: windows
      protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer
  sessionAffinity: ClientIP 
  selector:
    service: windows