apiVersion: v1
kind: Namespace
metadata:
  name: utils
  labels:
    name: utils
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logen-config
  namespace: utils
data:
  logen.yaml: |-
    metadata:
      region:
        NA:
          client_ip_range: '107.80.0.0/16'
          num_users: 10
          resource_attributes:
            cloud.availability_zone: "us-central1-a"
            cloud.region: "us-central"
            host.name: "k8s-default-pool-{host_uuid}"
            k8s.node.name: "k8s-default-pool-{host_uuid}"
            k8s.cluster.name: "k8s-us-central1"
        LATAM:
          client_ip_range: '186.189.224.0/20'
          num_users: 10
          resource_attributes:
            cloud.availability_zone: "southamerica-east1-b"
            cloud.region: "southamerica-east1"
            host.name: "k8s-default-pool-{host_uuid}"
            k8s.node.name: "k8s-default-pool-{host_uuid}"
            k8s.cluster.name: "k8s-southamerica-east1"
        EU:
          client_ip_range: '149.254.212.0/24'
          num_users: 10
          resource_attributes:
            cloud.availability_zone: "europe-west3-a"
            cloud.region: "europe-west3"
            host.name: "k8s-default-pool-{host_uuid}"
            k8s.node.name: "k8s-default-pool-{host_uuid}"
            k8s.cluster.name: "k8s-europe-west3"
        APAC:
          client_ip_range: '103.107.52.0/24'
          num_users: 10
          resource_attributes:
            cloud.availability_zone: "asia-east2-c"
            cloud.region: "asia-east2"
            host.name: "k8s-default-pool-{host_uuid}"
            k8s.node.name: "k8s-default-pool-{host_uuid}"
            k8s.cluster.name: "k8s-asia-east2"

    threads:
      - name: hadoop
        language: java
        mode: wired
        format: structured

        messages:
          nominal:
            file:
              path: logs/Hadoop_2k.log_structured.csv
              type: csv
            order: loop

        schedule:
          - type: service
            messages: nominal
            logs_per_second: 50

      - name: spark
        language: java
        mode: wired
        format: raw

        messages:
          nominal:
            file:
              path: logs/Spark_2k.log_structured.csv
              type: csv
            order: loop
          errors:
            lines:
              - body: "memory.MemoryStore: Not enough space to cache rdd_22_1, so persisting partition to disk instead."
                level: WARNING
              - body: |
                  java.lang.OutOfMemoryError (Java heap space)
                    at org.apache.spark.sql.execution.UnsafeRowSerializerInstance.serialize(UnsafeRowSerializer.scala:56)
                    at org.apache.spark.shuffle.sort.ShufflePartitionPairsWriter.write(ShufflePartitionPairsWriter.java:78)
                    at org.apache.spark.shuffle.sort.SortShuffleWriter.write(SortShuffleWriter.java:63)
                    at org.apache.spark.scheduler.ShuffleMapTask.runTask(ShuffleMapTask.scala:99)
                    at org.apache.spark.scheduler.ShuffleMapTask.runTask(ShuffleMapTask.scala:55)
                    at org.apache.spark.scheduler.Task.run(Task.scala:121)
                    at org.apache.spark.executor.Executor$TaskRunner.run(Executor.scala:444)
                    at java.util.concurrent.ThreadPoolExecutor.runWorker(ThreadPoolExecutor.java:1149)
                    at java.util.concurrent.ThreadPoolExecutor$Worker.run(ThreadPoolExecutor.java:624)
                    at java.lang.Thread.run(Thread.java:748)
                level: ERROR   
            order: loop

        schedule:
          - type: generate_exception
            messages: errors
            filter:
              percent: 50
            duration_minutes: 0.5
            repeat:
              min_minutes: 1
              max_minutes: 1

          - type: service
            messages: nominal
            logs_per_second: 50
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logen
  namespace: utils
  labels:
    service: logen
spec:
  replicas: 1
  selector:
    matchLabels:
      service: logen
  template:
    metadata:
      labels:
        service: logen
      annotations:
        io.opentelemetry.discovery.logs/enabled: "false"
    spec:
      containers:
        - name: logen
          image: $REPO/logen:$COURSE
          imagePullPolicy: Always
          env:
            - name: COLLECTOR_ADDRESS
              value: "http://opentelemetry-kube-stack-daemon-collector.opentelemetry-operator-system.svc.cluster.local:4317"
          volumeMounts:
            - name: config-volume
              mountPath: /logen/config/logen.yaml
              subPath: logen.yaml
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: logen-config
      restartPolicy: Always