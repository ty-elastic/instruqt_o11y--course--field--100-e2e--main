name: case_process
enabled: true
description: Perform RCA on a Case
tags:
- rca
consts:
  case_stable: 30s
  workflow_name: case_process
triggers:
- type: manual
  inputs:
  - name: alerts_ready
    default: false
    required: false
    type: boolean
  - name: force_update
    default: false
    required: false
    type: boolean
settings:
  timeout: 20m


steps:
- name: workflow_status
  type: kibana.request
  with:
    method: GET
    path: /api/workflows/workflow/{{ workflow.id }}/executions
    headers:
      x-elastic-internal-origin: kibana
- name: is_workflow_running
  type: if
  condition: 'steps.workflow_status.output.results[1].status : running'
  steps:
  - name: is_workflow_running_debug
    type: console
    with:
      message: workflow running
  else:
  - name: get_cases
    type: kibana.request
    with:
      headers:
        x-elastic-internal-origin: kibana
      method: GET
      path: /api/cases/_find?status=open&tags=rca

  - name: foreach_case
    type: foreach
    foreach: '{{ steps.get_cases.output.cases }}'
    steps:
    - name: is_case_ready
      type: if
      condition: 'inputs.alerts_ready : true OR foreach.item.updated_at < now-{{ consts.case_stable }}'
      steps:
      - name: get_alerts
        type: kibana.request
        with:
          method: GET
          path: /api/cases/{{ foreach.item.id }}/alerts

      - name: get_processed_alerts
        type: console
        with:
          message: "{% for field in foreach.item.customFields %}{%- if field.key == 'processed_alerts' -%}{{ field.value }}{% break %}{%- endif -%}{% endfor %}"

      - name: if_needs_update
        type: if
        condition: "inputs.force_update : true or not steps.get_processed_alerts.output : {{ steps.get_alerts.output.size | prepend: ''}}"
        steps:
        - name: get_ai_coversation_id
          type: console
          with:
            message: "{% for field in foreach.item.customFields %}{%- if field.key == 'ai_conversation_id' -%}{{ field.value }}{% break %}{%- endif -%}{% endfor %}"

        - name: rca
          type: ai.agent
          create-conversation: true
          agent-id: rca
          with:
            conversation_id: '{% if steps.get_ai_coversation_id.output != "not_available" %}{{ steps.get_ai_coversation_id.output }}{% endif %}'
            message: 'perform RCA on case id: {{ foreach.item.id }}'

        # - name: foreach_steps
        #   type: foreach
        #   foreach: '{{ steps.rca.output.steps }}'
        #   steps:
        #   - name: if_reasoning
        #     type: if
        #     condition: 'foreach.item.type: "reasoning"'
        #     steps:
        #     - name: add_reasoning_to_existing_case
        #       type: kibana.request
        #       with:
        #         method: POST
        #         path: /api/cases/{{ steps.foreach_case.item.id }}/comments
        #         body:
        #           type: user
        #           owner: observability
        #           comment: 🤔 {{ foreach.item.reasoning }}

        - name: get_case_refresh
          type: kibana.request
          with:
            method: GET
            path: /api/cases/{{ foreach.item.id }}

        - name: get_system_environment
          type: console
          with:
            message: "{% for field in steps.get_case_refresh.output.customFields %}{%- if field.key == 'system_environment' -%}{{ field.value }}{% break %}{%- endif -%}{% endfor %}"

        - name: update_fields
          type: kibana.request
          with:
            method: PATCH
            path: /api/cases
            body:
              cases:
              - id: '{{ foreach.item.id }}'
                version: '{{ steps.get_case_refresh.output.version }}'
                customFields:
                - key: system_environment
                  type: text
                  value: '{{ steps.get_system_environment.output}}'
                - key: ai_conversation_id
                  type: text
                  value: '{{ steps.rca.output.conversation_id }}'
                - key: processed_alerts
                  type: text
                  value: "{{ steps.get_alerts.output.size | prepend: ''}}"
          on-failure:
            continue: true

        - name: add_response_to_existing_case
          type: cases.addComment
          with:
            case_id: '{{ foreach.item.id }}'
            comment: '{{ steps.rca.output.message }}'
          on-failure:
            retry:
              max-attempts: 2
              delay: 1s

        - name: add_conversation_to_existing_case
          type: cases.addComment
          with:
            case_id: '{{ foreach.item.id }}'
            comment: '🔍 You can continue your investigation or take remediation action [here](/app/agent_builder/conversations/{{ steps.rca.output.conversation_id }}).'
          on-failure:
            retry:
              max-attempts: 2
              delay: 1s
