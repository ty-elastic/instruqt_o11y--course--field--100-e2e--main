name: remediation_service_action
enabled: true
consts:
  remote_host: http://host-1:43210
tags:
- rca
inputs:
- name: service_name
  type: string
  description: the name of the service
- name: namespace
  type: string
  description: namespace the service is running in
- name: service_action
  type: string
  description: the action to take (restart)
- name: case_id
  type: string
  default: NOT_AVAILABLE
triggers:
- type: manual
steps:

- name: review
  type: waitForInput
  with:
    message: |
      ## About to perform an action on a service

      **Service Name:** {{ inputs.service_name }}
      **Namespace:** {{ inputs.namespace}}
      **Requested Action:** {{ inputs.service_action}}   

      Proceed?
    schema:
      type: object
      properties:
        approved:
          type: boolean
          title: "Proceed"
      required: ["approved"]

- name: check_approval
  type: condition
  with:
    condition: "steps.review.output.approved : true"
  steps:
    - name: call_remote
      type: http
      with:
        url: '{{consts.remote_host}}/service/{{inputs.namespace}}/{{inputs.service_name}}/{{inputs.service_action}}'
        method: POST
        headers:
          Content-Type: application/json

    - name: add_comment_to_existing_case
      type: kibana.request
      with:
        method: POST
        path: /api/cases/{{ inputs.case_id }}/comments
        body:
          type: user
          owner: observability
          comment: ⚡ Attempted `{{inputs.service_action}}` of `{{inputs.service_name}}`
      on-failure:
        continue: true
