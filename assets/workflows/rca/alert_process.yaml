version: '1'
name: alert_process
description: Process o11y alerts and correlate to cases
enabled: true
tags:
- rca
consts:
  workflow_name: alert_process
  case_workflow_name: case_process
triggers:
- type: manual
settings:
  timeout: 20m
steps:
- name: get_workflows
  type: kibana.request
  with:
    method: GET
    path: /api/workflows?size=50&page=1
    headers:
      x-elastic-internal-origin: kibana
  timeout: 30s
- name: get_this_workflow_id
  type: console
  with:
    message: '{% for workflow in steps.get_workflows.output.results %}{%- if workflow.name == consts.workflow_name -%}{{ workflow.id }}{% break %}{%- endif -%}{% endfor %}'
- name: workflow_status
  type: kibana.request
  with:
    method: GET
    path: /api/workflows/workflow/{{ steps.get_this_workflow_id.output }}/executions
    headers:
      x-elastic-internal-origin: kibana
- name: is_workflow_running
  type: if
  condition: 'steps.workflow_status.output.results[1].status : running'
  steps:
  - name: is_workflow_running_debug
    type: console
    with:
      message: workflow running
  else:
  - name: get_active_alerts
    type: kibana.request
    with:
      method: POST
      path: /internal/rac/alerts/find
      headers:
        x-elastic-internal-origin: Kibana
      body:
        consumers: [apm, infrastructure, logs, uptime, slo, observability, alerts]
        query:
          bool:
            must:
            - range:
                '@timestamp':
                  gte: now-24h/h
            - term:
                kibana.alert.status: active
            - term:
                tags: rca
            must_not:
            - exists:
                field: kibana.alert.case_ids

  - name: foreach_alert
    type: foreach
    foreach: '{{ steps.get_active_alerts.output.hits.hits }}'
    steps:
    - name: correlate
      type: ai.agent
      create-conversation: true
      agent-id: rca
      with:
        schema:
          items:
            title: CorrelateAlert
            type: object
            additionalProperties: false
            required: [case_id, relation]
            properties:
              case_id:
                type: string
                description: if this alert is related to an existing case, the ID of the related case, otherwise `NONE`
                examples: [a194a64e-d555-46b8-9e50-9b93c3739f76, NONE]
              relation:
                type: string
                description: if this alert is related to an existing case, briefly explain how this alert relates to the identified case, otherwise briefly explain why it isn't related to existing cases
              title:
                type: string
                description: if this alert is not related to an existing case, briefly summarize the attached alert in a few words
              trigger:
                type: string
                description: if this alert is not related to an existing case, a detailed summary of the attached alert
              severity:
                type: string
                description: if this alert is not related to an existing case, a value of `low`, `medium`, `high`, or `critical` based on an initial analysis of the alert
                examples: [low, medium, high, critical]
              system_environment:
                type: string
                description: if, from the topologies, you can identify a system_environment associated with this alert, a value of the name of the associated system
        message: |
          Try to correlate this alert to a case: 
          ```json
          {{ foreach.item._source | json: 2 }}
          ```
    - name: new_or_update_case
      type: if
      condition: 'steps.correlate.output.structured_output[0].case_id : NONE'
      steps:
      - name: get_case_settings
        type: kibana.request
        with:
          method: GET
          path: /api/cases/configure
      - name: create_new_case
        type: kibana.createCaseDefaultSpace
        with:
          connector:
            id: '{{ steps.get_case_settings.output[0].connector.id }}'
            name: '{{ steps.get_case_settings.output[0].connector.name }}'
            type: ".servicenow"
            fields: 
              category: ''
              impact: ''
              severity: '{{ inputs.severity }}'
              subcategory: ''
              urgency: ''
          customFields:
          - key: system_environment
            type: text
            value: '{{ steps.correlate.output.structured_output[0].system_environment}}'
          description: '{{ steps.correlate.output.structured_output[0].trigger }}'
          owner: observability
          settings:
            syncAlerts: true
          severity: '{{ steps.correlate.output.structured_output[0].severity }}'
          tags:
          - rca
          title: '{{ steps.correlate.output.structured_output[0].title }}'
    - name: case_id
      type: console
      with:
        message: "{% if steps.correlate.output.structured_output[0].case_id == 'NONE' %}{{ steps.create_new_case.output.id }}{% else %}{{ steps.correlate.output.structured_output[0].case_id }}{%endif%}"
    - name: add_alert_to_case
      type: kibana.request
      with:
        method: POST
        path: /api/cases/{{ steps.case_id.output }}/comments
        body:
          type: alert
          alertId: '{{ foreach.item._id }}'
          index: '{{ foreach.item._index }}'
          owner: observability
          rule:
            id: '{{ foreach.item._source["kibana.alert.rule.uuid"] }}'
            name: '{{ foreach.item._source["kibana.alert.rule.name"] }}'
      on-failure:
        retry:
          max-attempts: 3
          delay: 1s
    - name: add_comment_to_case
      type: kibana.request
      with:
        method: POST
        path: /api/cases/{{ steps.case_id.output }}/comments
        body:
          type: user
          owner: observability
          comment: |
            # Related Alert
            * Summary: {{ foreach.item._source["kibana.alert.reason"] }}
            * [Conversation](/app/agent_builder/conversations/{{ steps.correlate.output.conversation_id }})
            * Relationship to Case: {{ steps.correlate.output.structured_output[0].relation }}

  - name: if_new_alerts
    type: if
    condition: steps.get_active_alerts.output.hits.total.value > 0
    steps:
    - name: get_case_workflow_id
      type: console
      with:
        message: '{% for workflow in steps.get_workflows.output.results %}{%- if workflow.name == consts.case_workflow_name -%}{{ workflow.id }}{% break %}{%- endif -%}{% endfor %}'
    - name: start_case_process_workflow
      type: kibana.request
      with:
        method: POST
        path: /api/workflows/workflow/{{ steps.get_case_workflow_id.output }}/run
        body:
          inputs:
            event: ''
            alerts_ready: true
        headers:
          x-elastic-internal-origin: kibana
