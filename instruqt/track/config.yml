version: "3"
virtualmachines:
- name: es3-api
  image: elastic/debian12nginx128
  shell: /bin/bash
  environment:
    PRODUCT_TIER: complete
    PROJECT_TYPE: observability
    REGIONS: aws-us-east-1
  memory: 4096
  cpus: 1
  provision_ssl_certificate: true
  allow_external_ingress:
  - high-ports
- name: k3s
  image: elastic/k3s-v1-33-4
  shell: /bin/bash
  memory: 16384
  cpus: 4
  allow_external_ingress:
  - high-ports 
- name: windows
  image: windows-sql-cloud/sql-std-2019-win-2022
  machine_type: n1-standard-4
secrets:
- name: ESS_CLOUD_API_KEY
