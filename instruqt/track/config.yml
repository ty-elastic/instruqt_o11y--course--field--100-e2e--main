version: "3"
virtualmachines:
- name: es3-api
  image: elastic/debian12nginx128
  shell: /bin/bash
  environment:
    PRODUCT_TIER: complete
    PROJECT_TYPE: observability
    REGIONS: aws-us-east-1
  memory: 4096
  cpus: 1
  provision_ssl_certificate: true
  allow_external_ingress:
  - https
- name: k3s
  image: instruqt/k3s-v1-35-2
  shell: /bin/bash
  memory: 16384
  cpus: 4
  provision_ssl_certificate: true
  allow_external_ingress:
  - high-ports 
secrets:
- name: ESS_CLOUD_API_KEY
