---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: trading
    service: processor-in
  name: processor-in
  namespace: $NAMESPACE
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading
      service: processor-in
  template:
    metadata:
      annotations:
        io.opentelemetry.discovery.logs/enabled: "false"
      labels:
        app: trading
        service: processor-in
    spec:
      containers:
        - name: processor-in
          env:
            - name: OTEL_SERVICE_NAME
              value: 'processor-in'

            - name: K8S_POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: K8s_NAMESPACE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.uid=$(K8S_POD_UID),k8s.namespace.name=$(K8s_NAMESPACE_NAME)"

            - name: BOOTSTRAP_SERVER
              value: "my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: IN_TOPIC
              value: "trades-$REGION"
            - name: IN_GROUP
              value: "consumer-$REGION"
            - name: NOTIFIER_ENDPOINT
              value: "http://router:9000/record"

          image: $REPO/processor:$COURSE
          imagePullPolicy: Always
          ports:
            - containerPort: 9003
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: trading
    service: processor-in
  name: processor-in
  namespace: $NAMESPACE
spec:
  ports:
    - name: processor-in
      port: 9003
      targetPort: 9003
  selector:
    app: trading
    service: processor-in
---