apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: $NAMESPACE
data:
  nginx.conf: |-
    load_module modules/ngx_otel_module.so;

    user  nginx;
    worker_processes  auto;

    error_log  /var/log/nginx/error.log debug;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  1024;
    }

    http {
        otel_exporter {
            endpoint opentelemetry-kube-stack-daemon-collector.opentelemetry-operator-system.svc.cluster.local:4317;
        }
        otel_service_name "proxy";
        otel_resource_attr k8s.namespace.name $NAMESPACE;
        #otel_trace on;

        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        log_format main '$http_x_forwarded_for - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent $upstream_response_time '
                        '"$http_referer" "$http_user_agent"';

        access_log  /var/log/nginx/access.log  main;

        sendfile        on;
        #tcp_nopush     on;

        keepalive_timeout  65;

        #gzip  on;

        include /etc/nginx/conf.d/*.conf;
    }
  cors.conf: |-
    if ($request_method = 'OPTIONS') {

        add_header 'Access-Control-Allow-Origin' '*';

        #
        # Om nom nom cookies
        #

        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';

        #
        # Custom headers and headers various browsers *should* be OK with but aren't
        #

        add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';

        #
        # Tell client that this pre-flight info is valid for 20 days
        #

        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;

        return 204;
    }
    if ($request_method = 'POST') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
    }
    if ($request_method = 'GET') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Credentials' 'true';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type';
    }
  default.conf: |-
    server {
        listen       80;

        proxy_connect_timeout       300;
        proxy_send_timeout          300;
        proxy_read_timeout          300;
        send_timeout                300;

        set_real_ip_from  10.0.0.0/8;
        real_ip_header    X-Forwarded-For;
        real_ip_recursive on;

        location /nginx_status {
            stub_status;
        }

        # APM
        location /telemetry/ {
            include cors.conf;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header x-k8snamespacename $NAMESPACE;

            proxy_pass http://opentelemetry-kube-stack-daemon-collector.opentelemetry-operator-system.svc.cluster.local:4318/;
        }

        # API
        location /trader/ {
            otel_trace $otel_parent_sampled;
            otel_trace_context propagate;

            include cors.conf;

            proxy_pass_request_headers on;
            # proxy_set_header traceparent $http_traceparent;
            # proxy_set_header baggage $http_baggage;

            proxy_http_version 1.1;
            proxy_pass http://trader:9001/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /monkey/ {
            otel_trace $otel_parent_sampled;
            otel_trace_context propagate;

            include cors.conf;

            proxy_pass_request_headers on;
            # proxy_set_header traceparent $http_traceparent;
            # proxy_set_header baggage $http_baggage;

            proxy_http_version 1.1;
            proxy_pass http://monkey:9002/;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # react app
        location / {
            include cors.conf;

            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  namespace: $NAMESPACE
  labels:
    app: trading
    service: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading
      service: proxy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: trading
        service: proxy
      annotations:
        #instrumentation.opentelemetry.io/inject-nginx: "opentelemetry-operator-system/elastic-instrumentation"

        io.opentelemetry.discovery.metrics/enabled: "true"
        io.opentelemetry.discovery.metrics/scraper: "nginx"
        io.opentelemetry.discovery.metrics.80/config: |
          endpoint: "http://`endpoint`/nginx_status"
        io.opentelemetry.discovery.logs/enabled: "true"
        io.opentelemetry.discovery.logs/config: |
          operators:
            - id: container-parser # Extract container's metadata
              type: container
            - id: es_index
              type: add
              field: attributes["elasticsearch.index"]
              value: logs.otel
    spec:
      containers:
        - image: nginx:1.28-otel
          name: proxy
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: frontend-claim0
            - name: nginx-config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config-volume
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-config-volume
              mountPath: /etc/nginx/cors.conf
              subPath: cors.conf
          env:
            - name: K8S_NAMESPACE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
      restartPolicy: Always
      volumes:
        - name: frontend-claim0
          persistentVolumeClaim:
            claimName: frontend-claim0
        - name: nginx-config-volume
          configMap:
            name: nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: trading
    service: proxy
  name: proxy
  namespace: $NAMESPACE
spec:
  ports:
    - name: proxy
      port: 9090
      targetPort: 80
  selector:
    app: trading
    service: proxy
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: trading
    service: proxy
  name: proxy-ext
  namespace: $NAMESPACE
spec:
  ports:
    - name: proxy
      port: {PROXY_PORT}
      targetPort: 80
  type: LoadBalancer
  selector:
    app: trading
    service: proxy
