---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: trading
    service: processor-out
  name: processor-out
  namespace: $NAMESPACE
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trading
      service: processor-out
  template:
    metadata:
      annotations:
        io.opentelemetry.discovery.logs/enabled: "false"
      labels:
        app: trading
        service: processor-out
    spec:
      containers:
        - name: processor-out
          env:
            - name: OTEL_SERVICE_NAME
              value: 'processor-out'

            - name: BOOTSTRAP_SERVER
              value: "my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
            - name: OUT_TOPIC
              value: "q1"

          image: $REPO/processor:$COURSE
          imagePullPolicy: Always
          ports:
            - containerPort: 9003
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: trading
    service: processor-out
  name: processor-out
  namespace: $NAMESPACE
spec:
  ports:
    - name: processor-out
      port: 9003
      targetPort: 9003
  selector:
    app: trading
    service: processor-out
---