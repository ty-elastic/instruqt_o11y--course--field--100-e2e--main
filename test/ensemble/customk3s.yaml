---
# last update {{ .Date }}
template_name: vm-gcp
template_description: |
  Deploy a virtual machine on Google Cloud Platform (GCP) with external stack monitoring (monitoring-oblt) and shared k8s cluster (autopilot-oblt).
  Parameters:
    - ClusterName: Name for the new oblt cluster (automatic).
    - SlackChannel: SlackChannel name or Slack member ID to send the credentials of the cluster (#my-channel, @MIDNUM)(automatic)
    - MachineType: GCP machine type for the VM (optional, default: "e2-medium")
    - Image: GCP image for the VM (optional, default: "debian-cloud/debian-11")
    - Zone: GCP zone for the VM (optional, default: "us-central1-a")
    - VmUser: Username to access the VM (optional, default: "debian")
    - StartupScript: Script code to run on VM initialization (optional, default: "")
  Usage:
    oblt-cli cluster create custom --template vm-gcp
    oblt-cli cluster create custom --template vm-gcp \
        --parameter MachineType=e2-standard-4
    oblt-cli cluster create custom --template vm-gcp \
        --parameter StartupScript='#!/bin/bash
    echo Hello > /tmp/hello.txt'
    oblt-cli cluster create custom --template vm-gcp \
        --parameter-from-file StartupScript=/path/to/script.sh
  For further information, please refer to the [documentation](https://elastic.github.io/observability-test-environments/user-guide/cluster-templates/#vm-gcp)

