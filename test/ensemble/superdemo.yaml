x-anchors:
  - &oblt_cli_common
    gcp_app_credentials: ".secrets/credentials.json"
    github_username: "{{ param.github_username }}"
    github_email: "{{ param.github_email }}"
    github_token: "{{ param.github_token }}"
    username: "{{ param.github_username }}"

  - &gcp_credentials_file
    type: file
    content: "{{ param.gcp_app_credentials }}"
    filename: ".secrets/credentials.json"

name: Kibana Onboarding (Kubernetes EA)
description: Test

params:
  - name: github_username
    description: GitHub Username
    type: exec
    command: gh
    args:
      - api
      - user
      - -q
      - ".login"

  - name: github_email
    description: GitHub Email
    type: exec
    command: git
    args:
      - config
      - user.email

  - name: github_token
    description: GitHub Token
    type: exec
    command: gh
    args:
      - auth
      - token

  - name: gcp_app_credentials
    description: GCP Credentials
    type: automation
    automation: gcp_auth


steps:
  - name: set
    id: const
    type: builtin.set_data
    with:
      COURSE: "o11y--course--field--100-e2e--test"
      ARTIFACTS_REPO: "elastic-sa/locations/us-central1/repositories/tbekiares-instruqt"
      ARTIFACT_VERSION: "1.0"
      ESS_TARGET: "staging"

  - name: Download code
    type: providers.shell.run
    with:
      script_file: "clone_code.sh"
    resources:
      - type: file
        filename: clone_code.sh
        content: |
          #!/bin/bash
          export COURSE={{ step.const.data.COURSE }}
          export ARTIFACTS_REPO={{ step.const.data.ARTIFACTS_REPO }}
          export ARTIFACT_VERSION={{ step.const.data.ARTIFACT_VERSION }}

          printf "download: https://artifactregistry.googleapis.com/download/v1/projects/$ARTIFACTS_REPO/files/$COURSE%3A$ARTIFACT_VERSION%3A$COURSE.tgz:download?alt=media\n"
          curl -X GET \
              -o o11y--course--field--100-e2e--serverless.tgz \
              "https://artifactregistry.googleapis.com/download/v1/projects/$ARTIFACTS_REPO/files/$COURSE%3A$ARTIFACT_VERSION%3A$COURSE.tgz:download?alt=media"
          mkdir o11y--course--field--100-e2e--serverless
          tar -xzf o11y--course--field--100-e2e--serverless.tgz -C o11y--course--field--100-e2e--serverless
    artifacts:
      - name: source_code
        paths:
          - o11y--course--field--100-e2e--serverless

  - name: Create serverless cluster
    id: cluster
    type: providers.oblt_cli.create_custom_cluster
    with:
      <<: *oblt_cli_common
      template: "serverless"
      parameters:
        GenData: false
        Target: "{{ step.const.data.ESS_TARGET }}"
        ProjectType: "observability"
        EphemeralCluster: true
        ExpiryDate: "{{ (now() + timedelta(days=1)) | isoformat }}"
        GitOps: "{{ 'true' if param.github_repository is defined else 'false' }}"
        GitHubRepository: "{{ param.github_repository | default('') }}"
        GitHubRepositoryOwner: "{{ param.github_repository_owner | default('') }}"
        GitHubRef: "{{ param.github_ref | default('') }}"
        Workflow: "{{ param.ci_workflow | default('') }}"
        WorkflowRef: "{{ param.ci_workflow_ref | default('') }}"
        GitHubRunId: "{{ param.ci_run_id | default('') }}"
        GitHubActor: "{{ param.github_actor | default('') }}"
        GitHubEvent: "{{ param.github_event | default('') }}"
        RunnerArch: "{{ param.runner_arch | default('') }}"
        RunnerOS: "{{ param.runner_os | default('') }}"
        CiType: GitHub
        ElasticDivision: "field"
        ElasticOrg: "sa"
        ElasticTeam: "amer-strat"
        ElasticProject: "tyronebekiares"
        ElasticOwner: "ty-elastic"
        Username: "ty-elastic"
    resources:
      - *gcp_credentials_file
    retry:
      max: 3
      interval: 5
    needs:
      - source_code

  - name: Create k8s cluster
    id: k8s
    type: providers.oblt_cli.create_custom_cluster
    with:
      <<: *oblt_cli_common
      template_file: "o11y--course--field--100-e2e--serverless/test/ensemble/customk8s.yaml"
      parameters:
        EphemeralCluster: true
        ExpiryDate: "{{ (now() + timedelta(days=1)) | isoformat }}"
        GitOps: "{{ 'true' if param.github_repository is defined else 'false' }}"
        GitHubRepository: "{{ param.github_repository | default('') }}"
        GitHubRepositoryOwner: "{{ param.github_repository_owner | default('') }}"
        GitHubRef: "{{ param.github_ref | default('') }}"
        Workflow: "{{ param.ci_workflow | default('') }}"
        WorkflowRef: "{{ param.ci_workflow_ref | default('') }}"
        GitHubRunId: "{{ param.ci_run_id | default('') }}"
        GitHubActor: "{{ param.github_actor | default('') }}"
        GitHubEvent: "{{ param.github_event | default('') }}"
        RunnerArch: "{{ param.runner_arch | default('') }}"
        RunnerOS: "{{ param.runner_os | default('') }}"
        CiType: GitHub
        ElasticDivision: "field"
        ElasticOrg: "sa"
        ElasticTeam: "amer-strat"
        ElasticProject: "tyronebekiares"
        ElasticOwner: "ty-elastic"
        Username: "ty-elastic"
    retry:
      max: 3
      interval: 5
    resources:
      - *gcp_credentials_file
    needs:
      - source_code

  - name: Refresh kubeconfig
    id: k8s
    type: providers.oblt_cli.search_cluster
    with:
      <<: *oblt_cli_common
      cluster_name: "{{ step.k8s.data.cluster_name }}"
    resources:
      - *gcp_credentials_file

  - name: infra_1
    type: providers.shell.run
    with:
      script_file: "setup1.sh"
    resources:
      - type: file
        filename: setup1.sh
        content: |
          #!/bin/bash
          export KUBECONFIG=$PWD/kubeconfig

          export COURSE={{ step.const.data.COURSE }}

          export ELASTICSEARCH_URL={{ step.cluster.data.elasticsearch_url }}
          export KIBANA_URL={{ step.cluster.data.kibana_url }}
          export ELASTICSEARCH_APIKEY={{ step.cluster.data.elasticsearch_apikey }}
          export INGEST_URL={{ step.cluster.data.ingest_url }}
          export FLEET_URL={{ step.cluster.data.fleet_url }}

          cd o11y--course--field--100-e2e--serverless

          # es bootstrap
          ./build.sh -o false -c $COURSE -d false -b false -s none -j $ELASTICSEARCH_URL -h $KIBANA_URL -i $ELASTICSEARCH_APIKEY -k $INGEST_URL -f true

          # infra
          ./build.sh -t $FLEET_URL -c $COURSE -1 true -j $ELASTICSEARCH_URL -h $KIBANA_URL -i $ELASTICSEARCH_APIKEY -k $INGEST_URL

          # services
          ./build.sh -o serverless -t $FLEET_URL -c $COURSE -d true -n true -b false -s all -j $ELASTICSEARCH_URL -h $KIBANA_URL -i $ELASTICSEARCH_APIKEY -k $INGEST_URL

          # synthetics, profiling
          ./build.sh -o false -t $FLEET_URL -c $COURSE -d false -b false -s none -j $ELASTICSEARCH_URL -h $KIBANA_URL -i $ELASTICSEARCH_APIKEY -k $INGEST_URL -p true -m true

          # assets
          ./build.sh -o false -c $COURSE -d false -b false -s none -j $ELASTICSEARCH_URL -h $KIBANA_URL -i $ELASTICSEARCH_APIKEY -k $INGEST_URL -w true

          # grafana
          ./build.sh -o false -c $COURSE -d false -b false -s none -j $ELASTICSEARCH_URL -h $KIBANA_URL -i $ELASTICSEARCH_APIKEY -k $INGEST_URL -g true
      - type: env
        variables:
          KUBECONFIG: "kubeconfig"
      - type: file
        content: "{{ step.k8s.data.kube_config }}"
        filename: "kubeconfig"
    needs:
      - source_code

  - name: services
    type: providers.shell.run
    with:
      script_file: "services.sh"
    resources:
      - type: file
        filename: services.sh
        content: |
          #!/bin/bash
          export KUBECONFIG=$PWD/kubeconfig

          get_lb_address() {
            printf "$FUNCNAME...\n"
              export SERVICE_IP=$(kubectl -n $1 get service $2 -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
              export SERVICE_PORT=$(kubectl -n $1 get service $2 -o jsonpath='{.spec.ports[0].port}')
              if [ -z "$SERVICE_IP" ]; then
                printf "$FUNCNAME...ERROR $http_code: $http_response\n"
                return 1
            fi
            printf "$FUNCNAME...SUCCESS $SERVICE_IP $SERVICE_PORT\n"
            return 0
          }

          get_lb_address wiki wiki-ext
          export WIKI_SERVICE_IP=$SERVICE_IP
          export WIKI_SERVICE_PORT=$SERVICE_PORT
          get_lb_address trading-na proxy-ext
          export TRADER_SERVICE_IP=$SERVICE_IP
          export TRADER_SERVICE_PORT=$SERVICE_PORT
          get_lb_address infra grafana-ext
          export GRAFANA_SERVICE_IP=$SERVICE_IP
          export GRAFANA_SERVICE_PORT=$SERVICE_PORT

          cat > ".env" <<EOF
          WIKI_URL=http://$WIKI_SERVICE_IP:$WIKI_SERVICE_PORT
          TRADER_URL=http://$TRADER_SERVICE_IP:$TRADER_SERVICE_PORT
          GRAFANA_URL=http://$GRAFANA_SERVICE_IP:$GRAFANA_SERVICE_PORT
          ELASTICSEARCH_URL={{ step.cluster.data.elasticsearch_url }}
          ELASTICSEARCH_AUTH_BASE64=$(echo -n "{{ step.cluster.data.elasticsearch_username }}:{{ step.cluster.data.elasticsearch_password }}" | base64)
          EOF
      - type: env
        variables:
          KUBECONFIG: "kubeconfig"
      - type: file
        content: "{{ step.k8s.data.kube_config }}"
        filename: "kubeconfig"
    artifacts:
      - name: env
        paths:
          - .env

  - id: onboarding
    name: Run playwright test
    type: providers.playwright.test
    with:
      config: "o11y--course--field--100-e2e--serverless/test/playwright/playwright.config.ts"
      spec_file: "o11y--course--field--100-e2e--serverless/test/playwright/tests/example.spec.js"
      node_version: ".nvmrc"
    async: true
    needs:
      - env
    artifacts:
      - name: test_results
        paths:
          - "o11y--course--field--100-e2e--serverless/test/playwright/.playwright/"
    retry:
      max: 3
      interval: 5

